<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 教典更新詞目</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'jf-openhuninn';
    src: url('https://cdn.jsdelivr.net/gh/justfont/open-huninn-font@v2.1/font/jf-openhuninn-2.1.ttf') format('truetype');
    font-display: swap;
  }

  :root {
    --ink: #2a1a0a;
    --paper: #f5ead6;
    --paper-dark: #e8d5b0;
    --aged: #c8a96e;
    --rust: #8b3a1a;
    --teal: #1a5f5a;
    --teal-light: #2a8a82;
    --gold: #b8860b;
    --gold-light: #d4a832;
    --red: #8b1a1a;
    --stamp-red: #c0392b;
    --shadow: rgba(42,26,10,0.18);
    --border: #a0824a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'jf-openhuninn', 'Noto Serif TC', serif;
    font-size: 17px;
    background-color: #d4b896;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(160,130,74,0.08) 28px, rgba(160,130,74,0.08) 29px),
      repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(160,130,74,0.05) 28px, rgba(160,130,74,0.05) 29px);
    min-height: 100vh;
    color: var(--ink);
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(160deg, #1a3a2a 0%, #0f2a20 40%, #1a2a1a 100%);
    border-bottom: 6px double var(--gold);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(180,140,60,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(180,140,60,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 36px 24px 28px;
    position: relative;
    z-index: 1;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .title-block { flex: 1; }
  .title-zh {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.08em;
    line-height: 1.3;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    font-family: 'jf-openhuninn', serif;
  }

  .header-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }
  .stamp {
    background: var(--stamp-red);
    color: #fff;
    font-size: 0.9rem;
    font-family: 'jf-openhuninn', serif;
    padding: 4px 10px;
    letter-spacing: 0.12em;
    border: 2px solid rgba(255,255,255,0.3);
    transform: rotate(2deg);
    white-space: nowrap;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.3);
  }
  .count-badge {
    color: rgba(212,168,50,0.6);
    font-size: 0.95rem;
    font-family: 'jf-openhuninn', serif;
    letter-spacing: 0.06em;
  }

  /* ── ROMANIZATION TOGGLE ── */
  .rom-toggle-wrap {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .rom-label {
    color: rgba(212,168,50,0.75);
    font-size: 1rem;
    font-family: 'jf-openhuninn', serif;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .rom-toggle {
    display: inline-flex;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid var(--gold);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
  }
  .rom-toggle span {
    padding: 7px 20px;
    font-size: 1rem;
    font-family: 'jf-openhuninn', serif;
    color: rgba(212,168,50,0.6);
    transition: background 0.2s, color 0.2s;
    user-select: none;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .rom-toggle span.active {
    background: var(--gold);
    color: #1a1a00;
    font-weight: 700;
  }

  /* ── CONTROLS BAR ── */
  .controls {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 24px 0;
  }
  .controls-inner {
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-bottom: none;
    padding: 18px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
  }
  .controls-inner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: repeating-linear-gradient(90deg, var(--gold) 0, var(--gold) 6px, transparent 6px, transparent 12px);
  }
  .filter-label {
    font-size: 0.95rem;
    font-family: 'jf-openhuninn', serif;
    color: var(--rust);
    letter-spacing: 0.1em;
    font-weight: 700;
  }
  .filter-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border: 1.5px solid var(--border);
    background: var(--paper-dark);
    color: var(--ink);
    font-family: 'jf-openhuninn', serif;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.18s;
    letter-spacing: 0.04em;
  }
  .filter-btn:hover { background: var(--aged); border-color: var(--gold); }
  .filter-btn.active {
    background: var(--teal);
    color: #e8f5f3;
    border-color: var(--teal);
  }
  .filter-btn .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.6;
    flex-shrink: 0;
  }
  .filter-btn .cnt {
    font-size: 0.85rem;
    opacity: 0.65;
  }
  .result-info {
    font-size: 0.9rem;
    font-family: 'jf-openhuninn', serif;
    color: var(--rust);
    letter-spacing: 0.04em;
    opacity: 0.8;
  }

  /* ── MAIN CONTENT ── */
  .main-wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 40px;
  }
  .table-shell {
    background: var(--paper);
    border: 1.5px solid var(--border);
    overflow: hidden;
    box-shadow: 4px 4px 0 rgba(100,70,30,0.15), 8px 8px 0 rgba(100,70,30,0.07);
  }

  /* ── TABLE ── */
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    background: linear-gradient(180deg, #1a3a2a 0%, #0f2820 100%);
    color: var(--gold-light);
    font-size: 1rem;
    font-family: 'jf-openhuninn', serif;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 12px 16px;
    text-align: left;
    border-right: 1px solid rgba(180,140,60,0.2);
    white-space: nowrap;
  }
  thead th:last-child { border-right: none; }
  thead th #th-rom-label {
    font-size: 0.8rem;
    opacity: 0.7;
    font-weight: 400;
  }

  .entry-row {
    border-bottom: 1px solid rgba(160,130,74,0.3);
    transition: background 0.15s;
  }
  .entry-row:last-child { border-bottom: none; }
  .entry-row:hover > td { background: rgba(180,140,60,0.08); }
  .entry-row.even > td { background: rgba(240,225,195,0.4); }
  .entry-row.even:hover > td { background: rgba(180,140,60,0.12); }

  td {
    padding: 11px 16px;
    vertical-align: middle;
    border-right: 1px solid rgba(160,130,74,0.2);
    font-size: 1rem;
    font-family: 'jf-openhuninn', serif;
    line-height: 1.6;
  }
  td:last-child { border-right: none; }

  .col-num { display: none; }
  .col-word {
    min-width: 100px;
    font-size: 1.1rem;
    font-family: 'jf-openhuninn', serif;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.06em;
  }
  .col-rom {
    min-width: 160px;
    color: var(--teal);
    font-size: 0.95rem;
    font-family: 'jf-openhuninn', serif;
    letter-spacing: 0.01em;
  }
  .col-cat {
    width: 120px;
  }
  .cat-badge {
    display: inline-block;
    padding: 3px 10px;
    font-size: 0.85rem;
    font-family: 'jf-openhuninn', serif;
    letter-spacing: 0.06em;
    border: 1px solid;
    border-radius: 1px;
    white-space: nowrap;
  }
  .cat-一般詞條 { color: var(--teal); border-color: var(--teal); background: rgba(26,95,90,0.07); }
  .cat-俗諺    { color: var(--rust); border-color: var(--rust); background: rgba(139,58,26,0.07); }
  .cat-臺華共同詞 { color: var(--gold); border-color: var(--gold); background: rgba(184,134,11,0.07); }

  .col-preview { width: 90px; text-align: center; }

  .open-link-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    background: var(--teal);
    color: #e8f5f3;
    font-family: 'jf-openhuninn', serif;
    font-size: 0.9rem;
    border: none;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.04em;
    border-radius: 1px;
    transition: background 0.18s;
    white-space: nowrap;
  }
  .open-link-btn:hover { background: var(--teal-light); }

  /* ── EMPTY STATE ── */
  .empty-row td {
    padding: 48px;
    text-align: center;
    color: var(--rust);
    opacity: 0.5;
    font-size: 1rem;
    font-family: 'jf-openhuninn', serif;
    letter-spacing: 0.1em;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 24px;
    color: rgba(42,26,10,0.4);
    font-size: 0.9rem;
    font-family: 'jf-openhuninn', serif;
    letter-spacing: 0.08em;
    line-height: 2;
  }
  .ornament {
    color: var(--gold);
    opacity: 0.5;
    font-size: 1rem;
    letter-spacing: 0.3em;
  }

  /* ── SEARCH ── */
  .search-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .search-input {
    flex: 1;
    max-width: 300px;
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    background: var(--paper-dark);
    color: var(--ink);
    font-family: 'jf-openhuninn', serif;
    font-size: 1rem;
    border-radius: 1px;
    outline: none;
    transition: border-color 0.18s;
  }
  .search-input:focus { border-color: var(--teal); }
  .search-input::placeholder { color: rgba(42,26,10,0.3); }

  /* Responsive */
  @media (max-width: 600px) {
    .header-inner { padding: 24px 16px 20px; }
    .controls { padding: 16px 16px 0; }
    .main-wrap { padding: 0 16px 32px; }
    td, thead th { padding: 8px 10px; font-size: 0.9rem; }
    .col-word { min-width: 70px; font-size: 1rem; }
    .col-rom { min-width: 110px; font-size: 0.88rem; }
    .col-cat { width: 90px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="title-block">
        <div class="title-zh">2026 教育部臺灣台語常用詞辭典・更新詞目</div>
      </div>
      <div class="header-meta">
        <div class="stamp">教典 2026</div>
        <div class="count-badge" id="total-count">共 510 筆</div>
      </div>
    </div>
    <div class="rom-toggle-wrap">
      <span class="rom-label">拼音系統：</span>
      <div class="rom-toggle" id="romToggle" onclick="toggleRom()" title="切換拼音 / Toggle romanization">
        <span id="rom-tai" class="active">臺羅</span>
        <span id="rom-poj">白話字</span>
      </div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="filter-label">分類篩選</div>
    <div class="filter-buttons">
      <button class="filter-btn active" data-cat="all" onclick="setFilter('all', this)">
        <span class="dot"></span>全部 <span class="cnt" id="cnt-all">(510)</span>
      </button>
      <button class="filter-btn" data-cat="一般詞條" onclick="setFilter('一般詞條', this)">
        <span class="dot"></span>一般詞條 <span class="cnt" id="cnt-1">(120)</span>
      </button>
      <button class="filter-btn" data-cat="俗諺" onclick="setFilter('俗諺', this)">
        <span class="dot"></span>俗諺 <span class="cnt" id="cnt-2">(40)</span>
      </button>
      <button class="filter-btn" data-cat="臺華共同詞" onclick="setFilter('臺華共同詞', this)">
        <span class="dot"></span>臺華共同詞 <span class="cnt" id="cnt-3">(350)</span>
      </button>
    </div>
    <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
      <div class="search-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="搜尋詞目…" oninput="doSearch()" />
      </div>
      <div class="result-info" id="result-info"></div>
    </div>
  </div>
</div>

<div class="main-wrap">
  <div class="table-shell">
    <table id="mainTable">
      <thead>
        <tr>
          <th>詞目</th>
          <th><span id="th-rom-label" style="font-size:0.8rem;opacity:0.7;font-weight:400;">台羅・</span>拼音</th>
          <th class="col-cat">分類</th>
          <th class="col-preview">連結</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<footer>
  <div class="ornament">❧ ✦ ❧</div>
  <div style="margin-top:8px;">
    資料來源：教育部台灣台語常用詞辭典・2026 年更新詞目
  </div>
  <div style="margin-top:6px; opacity:0.5;">
    點擊「↗ 開啟」按鈕可於新分頁開啟教育部辭典頁面
  </div>
</footer>

// ── STATE ──
let useRom = 'tai'; // 'tai' | 'poj'
let activeFilter = 'all';
let searchQ = '';

// ── RENDER ──
function getRom(item) {
  return useRom === 'tai' ? item['台羅'] : item['白話字'];
}

function getFiltered() {
  return DATA.filter((d, i) => {
    const catOk = activeFilter === 'all' || d['分類'] === activeFilter;
    const q = searchQ.trim().toLowerCase();
    if (!q) return catOk;
    const searchIn = (d['詞目'] + d['台羅'] + d['白話字']).toLowerCase();
    return catOk && searchIn.includes(q);
  });
}

function render() {
  const filtered = getFiltered();
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  if (filtered.length === 0) {
    const tr = document.createElement('tr');
    tr.className = 'empty-row';
    tr.innerHTML = `<td colspan="5">查無結果 ・ Bô-khuē-tio̍h</td>`;
    tbody.appendChild(tr);
    updateInfo(0);
    return;
  }

  filtered.forEach((item, idx) => {
    const hasLink = item['連結'] && item['連結'].trim() !== '';
    const evenClass = idx % 2 === 1 ? ' even' : '';
    const rowId = 'entry-' + idx;

    // Main row
    const tr = document.createElement('tr');
    tr.className = 'entry-row' + evenClass;
    tr.id = rowId;

    const btnHtml = hasLink
      ? `<a class="open-link-btn" href="${item['連結']}" target="_blank" rel="noopener" title="開啟辭典頁面">↗ 開啟</a>`
      : `<span style="color:var(--border);font-size:0.7rem;opacity:0.4">—</span>`;

    tr.innerHTML = `
      <td class="col-num" style="display:none"></td>
      <td class="col-word">${item['詞目']}</td>
      <td class="col-rom rom-cell">${getRom(item)}</td>
      <td class="col-cat"><span class="cat-badge cat-${item['分類']}">${item['分類']}</span></td>
      <td class="col-preview">${btnHtml}</td>
    `;
    tbody.appendChild(tr);


  });

  updateInfo(filtered.length);
}



function updateInfo(count) {
  const total = DATA.length;
  document.getElementById('result-info').textContent =
    count === total
      ? `共 ${total} 筆`
      : `顯示 ${count} / ${total} 筆`;
}

// ── FILTER ──
function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── SEARCH ──
function doSearch() {
  searchQ = document.getElementById('searchInput').value;
  render();
}

// ── ROM TOGGLE ──
function toggleRom() {
  useRom = useRom === 'tai' ? 'poj' : 'tai';
  const tai = document.getElementById('rom-tai');
  const poj = document.getElementById('rom-poj');
  const thLabel = document.getElementById('th-rom-label');

  if (useRom === 'tai') {
    tai.classList.add('active'); poj.classList.remove('active');
    thLabel.textContent = '台羅・';
  } else {
    poj.classList.add('active'); tai.classList.remove('active');
    thLabel.textContent = '白話字・';
  }

  // Update all visible rom cells
  document.querySelectorAll('.rom-cell').forEach((cell, i) => {
    const filtered = getFiltered();
    if (filtered[i]) cell.textContent = getRom(filtered[i]);
  });
}

// ── INIT ──
render();
</script>
